; ─────────────────────────────────────────────────────────────────────────────
; ESP32 Sensor Dashboard — PlatformIO build config
;
; Flash instructions:
;   pio run --target uploadfs   ← web files (HTML/CSS/JS) to LittleFS
;   pio run --target upload     ← firmware
;   pio device monitor --baud 115200
; ─────────────────────────────────────────────────────────────────────────────

[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200

; LittleFS is used to store the web dashboard files (data/ directory)
board_build.filesystem = littlefs

lib_deps =
  ESP32Async/ESPAsyncWebServer    ; async HTTP + WebSocket server
  bblanchon/ArduinoJson@^7.0.4   ; JSON serialisation
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.14
